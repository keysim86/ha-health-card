name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-forgejo:
    if: ${{ !contains(github.server_url, 'github.com') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Forgejo Release
        env:
          FORGEJO_TOKEN: ${{ github.token }}
        run: |
          VERSION_NO="${{ steps.version.outputs.VERSION }}"
          VERSION_NO="${VERSION_NO#v}"
          BODY=$(awk "/^## \[$VERSION_NO\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md | jq -Rs .)
          if echo "$VERSION_NO" | grep -q '-'; then PRERELEASE=true; else PRERELEASE=false; fi
          RESPONSE=$(curl -s -X POST \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${{ steps.version.outputs.VERSION }}\", \"name\": \"Health Card ${{ steps.version.outputs.VERSION }}\", \"body\": $BODY, \"prerelease\": $PRERELEASE}")
          RELEASE_ID=$(echo $RESPONSE | jq -r '.id')
          curl -s -X POST \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/$RELEASE_ID/assets" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -F "attachment=@health-card.js"

  release-github:
    if: ${{ contains(github.server_url, 'github.com') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          VERSION_NO="${VERSION#v}"
          BODY=$(awk "/^## \[$VERSION_NO\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          PRERELEASE_FLAG=""
          if echo "$VERSION_NO" | grep -q '-'; then PRERELEASE_FLAG="--prerelease"; fi
          gh release create "$VERSION" \
            --title "Health Card $VERSION" \
            --notes "$BODY" \
            $PRERELEASE_FLAG \
            health-card.js
